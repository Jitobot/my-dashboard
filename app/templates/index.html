<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="dashboard">
        <div class="panel panel-clock">
            <div class="clock-section">
                <div id="date" class="date-text"></div>
                <div id="time" class="time-text"></div>
            </div>
            <div class="weather-section">
                <div class="weather-header">
                    <h2>天気</h2>
                    <select id="city-select" class="city-select"></select>
                </div>
                <div id="weather-current" class="weather-current">
                    <p class="placeholder">読み込み中...</p>
                </div>
                <div id="weather-hourly" class="weather-hourly"></div>
            </div>
        </div>

        <div class="panel panel-calendar">
            <h2>今日の予定</h2>
            <p class="placeholder">Phase 5 で実装</p>
        </div>

        <div class="panel panel-memo">
            <h2>メモ</h2>
            <textarea id="memo" class="memo-textarea" placeholder="自由にメモを書けます..."></textarea>
            <div id="memo-status" class="memo-status"></div>
        </div>

        <div class="panel panel-todo">
            <h2>ToDo</h2>
            <p class="placeholder">Phase 4 で実装</p>
        </div>
    </div>
    <script src="/static/js/app.js"></script>
</body>
</html>
